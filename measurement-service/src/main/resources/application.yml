server:
  port: 8081

spring:
  application:
    name: measurement-service
  datasource:
    url: jdbc:h2:mem:measurementdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ThisIsASecretKeyForJWTQuantityMeasurementApp2024
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
